name: RDP Windows 11

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Install Chocolatey
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force;
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072;
        iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'));
        choco install -y googlechrome firefox winrar;

    - name: Setup RDP
      run: |
        net user user123 Pass12345! /add;
        net localgroup administrators user123 /add;
        reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f;
        netsh advfirewall firewall set rule group="remote desktop" new enable=Yes;

    - name: Install Ngrok
      run: |
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip";
        Expand-Archive ngrok.zip -DestinationPath .;
        .\ngrok.exe config add-authtoken ${{ secrets.NGROK_TOKEN }};
        Start-Process -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389";
        Start-Sleep -Seconds 300;
      env:
        NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        
